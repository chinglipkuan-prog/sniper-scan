# render.yaml — 一键部署到 Render
services:
  - type: web
    name: sniper-scan
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && npm install --silent
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
